<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriGuide — AI Food Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green:   #2ECC71;
      --forest:  #1F5133;
      --lime:    #A6F76C;
      --orange:  #FF6F3C;
      --yellow:  #FFD93D;
      --mint:    #D6FFF5;
      --black:   #0D1117;
      --dark:    #161B22;
      --card:    #1C2330;
      --border:  rgba(255,255,255,0.07);
      --text:    #E6EDF3;
      --muted:   #8B949E;
      --radius:  16px;
      --font:    'Syne', sans-serif;
      --body:    'DM Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: var(--body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── ANIMATIONS ──────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(46,204,113,0.4); }
      70%  { box-shadow: 0 0 0 20px rgba(46,204,113,0); }
      100% { box-shadow: 0 0 0 0 rgba(46,204,113,0); }
    }
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-8px); }
    }
    @keyframes glow {
      0%,100% { text-shadow: 0 0 20px rgba(46,204,113,0.3); }
      50%      { text-shadow: 0 0 40px rgba(46,204,113,0.7), 0 0 80px rgba(46,204,113,0.3); }
    }

    .animate-in { animation: fadeUp 0.5s ease forwards; }

    /* ─── LAYOUT ─────────────────────────────────────── */
    .app-shell {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ─── HEADER ─────────────────────────────────────── */
    .header {
      padding: 20px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(13,17,23,0.9);
      backdrop-filter: blur(20px);
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font);
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.5px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--green), var(--forest));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      animation: float 3s ease-in-out infinite;
    }

    .logo span { color: var(--green); }

    .header-badge {
      background: rgba(46,204,113,0.1);
      border: 1px solid rgba(46,204,113,0.3);
      color: var(--green);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    /* ─── NAV ────────────────────────────────────────── */
    .nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: rgba(22,27,34,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 8px 0 20px;
      z-index: 100;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      background: none;
      color: var(--muted);
      font-family: var(--body);
      font-size: 11px;
      font-weight: 500;
    }

    .nav-item.active { color: var(--green); }
    .nav-item:hover  { color: var(--text); }

    .nav-icon {
      font-size: 22px;
      transition: transform 0.2s;
    }
    .nav-item.active .nav-icon { transform: scale(1.15); }

    /* ─── CONTENT ─────────────────────────────────────── */
    .content {
      flex: 1;
      padding: 24px 20px 100px;
      overflow-y: auto;
    }

    /* ─── CARDS ──────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: rgba(46,204,113,0.2); }

    /* ─── HERO CARD ──────────────────────────────────── */
    .hero-card {
      background: linear-gradient(135deg, var(--forest) 0%, #0D2418 100%);
      border: 1px solid rgba(46,204,113,0.2);
      border-radius: 20px;
      padding: 28px 24px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(46,204,113,0.15) 0%, transparent 70%);
    }

    .hero-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--lime);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .hero-title {
      font-family: var(--font);
      font-size: 28px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 8px;
      animation: glow 3s ease-in-out infinite;
    }

    .hero-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* ─── SCORE RING ─────────────────────────────────── */
    .score-ring-container {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 20px 0;
    }

    .score-ring {
      position: relative;
      width: 100px;
      height: 100px;
      flex-shrink: 0;
    }

    .score-svg { transform: rotate(-90deg); }

    .score-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .score-value {
      font-family: var(--font);
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .score-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* ─── BUTTONS ────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      border-radius: 12px;
      font-family: var(--font);
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      letter-spacing: 0.2px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--green), #27AE60);
      color: var(--black);
      width: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(46,204,113,0.3);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text);
      width: 100%;
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.1); }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    /* ─── INPUTS ─────────────────────────────────────── */
    .input-group { margin-bottom: 16px; }

    .input-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-family: var(--body);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input:focus {
      border-color: rgba(46,204,113,0.5);
      box-shadow: 0 0 0 3px rgba(46,204,113,0.08);
    }

    .input::placeholder { color: var(--muted); }

    /* ─── TAGS ───────────────────────────────────────── */
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }

    .tag {
      background: rgba(46,204,113,0.1);
      border: 1px solid rgba(46,204,113,0.25);
      color: var(--green);
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tag.active {
      background: var(--green);
      color: var(--black);
      border-color: var(--green);
    }

    .tag:hover { border-color: var(--green); }

    /* ─── STAT GRID ──────────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 16px 0;
    }

    .stat-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .stat-num {
      font-family: var(--font);
      font-size: 22px;
      font-weight: 800;
      color: var(--green);
    }

    .stat-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ─── QUICK ACTIONS ──────────────────────────────── */
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 8px;
    }

    .quick-action {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
    }

    .quick-action:hover {
      background: rgba(46,204,113,0.08);
      border-color: rgba(46,204,113,0.3);
      color: var(--text);
      transform: translateY(-2px);
    }

    .quick-action-icon { font-size: 24px; }

    /* ─── LOADING ────────────────────────────────────── */
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    .loading-card {
      background: linear-gradient(90deg, var(--card) 0%, rgba(46,204,113,0.05) 50%, var(--card) 100%);
      background-size: 400px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 12px;
      height: 80px;
      margin-bottom: 12px;
    }

    /* ─── NUTRI BADGE ────────────────────────────────── */
    .nutri-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 8px;
      font-family: var(--font);
      font-weight: 800;
      font-size: 16px;
      color: white;
    }

    .badge-A { background: #038141; }
    .badge-B { background: #85BB2F; }
    .badge-C { background: #FECB02; color: #000; }
    .badge-D { background: #EE8100; }
    .badge-E { background: #E63E11; }
    .badge-unknown { background: #555; font-size: 12px; }

    /* ─── CHAT ───────────────────────────────────────── */
    .chat-messages {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
      max-height: calc(100vh - 280px);
      overflow-y: auto;
    }

    .msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      animation: fadeUp 0.3s ease;
    }

    .msg-user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--green), #27AE60);
      color: var(--black);
      border-bottom-right-radius: 4px;
      font-weight: 500;
    }

    .msg-ai {
      align-self: flex-start;
      background: var(--card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      white-space: pre-wrap;
    }

    .chat-input-row {
      display: flex;
      gap: 8px;
      position: sticky;
      bottom: 0;
    }

    .chat-input-row .input { flex: 1; }

    .send-btn {
      background: var(--green);
      color: var(--black);
      border: none;
      border-radius: 10px;
      width: 48px;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .send-btn:hover { background: #27AE60; transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }

    /* ─── UPF METER ──────────────────────────────────── */
    .upf-meter {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      height: 8px;
      margin: 6px 0;
      overflow: hidden;
    }

    .upf-fill {
      height: 100%;
      border-radius: 8px;
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ─── SECTION TITLE ──────────────────────────────── */
    .section-title {
      font-family: var(--font);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }

    .section-title span { color: var(--green); }

    /* ─── PLAN OUTPUT ────────────────────────────────── */
    .plan-output {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      max-height: 500px;
      overflow-y: auto;
      color: var(--text);
    }

    /* ─── ALERT ──────────────────────────────────────── */
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 12px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .alert-warn {
      background: rgba(255,111,60,0.1);
      border: 1px solid rgba(255,111,60,0.3);
      color: #FF9A7A;
    }

    .alert-success {
      background: rgba(46,204,113,0.08);
      border: 1px solid rgba(46,204,113,0.25);
      color: var(--green);
    }

    /* ─── FOOD IMAGE ─────────────────────────────────── */
    .food-img {
      width: 80px; height: 80px;
      object-fit: contain;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      padding: 4px;
    }

    .food-img-placeholder {
      width: 80px; height: 80px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    /* ─── PILL TABS ──────────────────────────────────── */
    .pill-tabs {
      display: flex;
      gap: 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 20px;
    }

    .pill-tab {
      flex: 1;
      padding: 10px;
      border-radius: 9px;
      border: none;
      background: none;
      color: var(--muted);
      font-family: var(--font);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .pill-tab.active {
      background: var(--card);
      color: var(--green);
      border: 1px solid rgba(46,204,113,0.2);
    }

    /* ─── EMPTY STATE ────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-state-icon { font-size: 48px; margin-bottom: 12px; display: block; }
    .empty-state-title { font-family: var(--font); font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .empty-state-sub { font-size: 14px; line-height: 1.5; }

    /* ─── API STATUS ─────────────────────────────────── */
    .api-notice {
      background: rgba(255,211,61,0.08);
      border: 1px solid rgba(255,211,61,0.25);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      color: #FFD93D;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    code {
      background: rgba(255,255,255,0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }

    /* ─── SCROLLBAR ──────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* ─── PRODUCT CARD ───────────────────────────────── */
    .product-row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .product-info { flex: 1; min-width: 0; }
    .product-name {
      font-family: var(--font);
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 4px;
      line-height: 1.2;
    }
    .product-brand { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  </style>
</head>
<body>
<div class="app-shell" id="app">
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">🥦</div>
      Nutri<span>Guide</span>
    </div>
    <span class="header-badge">AI POWERED</span>
  </header>

  <!-- Content -->
  <main class="content" id="content"></main>

  <!-- Bottom Nav -->
  <nav class="nav" id="nav"></nav>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
// Change this to your Railway/Render deployment URL when deployed
// For local dev: http://localhost:8000
const API_BASE = 'http://localhost:8000';

// ─── STATE ────────────────────────────────────────────────────────────────
let currentTab = 'home';
let chatHistory = [];
let scanResult  = null;
let mealPlan    = null;
let isLoading   = false;

// ─── NAV CONFIG ───────────────────────────────────────────────────────────
const NAV_ITEMS = [
  { id: 'home',    icon: '🏠', label: 'Home'    },
  { id: 'scan',    icon: '📷', label: 'Scan'    },
  { id: 'plan',    icon: '📋', label: 'Plan'    },
  { id: 'shop',    icon: '🛒', label: 'Shop'    },
  { id: 'chat',    icon: '💬', label: 'Chat'    },
];

// ─── API HELPERS ───────────────────────────────────────────────────────────
async function apiCall(endpoint, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);

  const res = await fetch(`${API_BASE}${endpoint}`, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

// ─── HEALTH SCORE COLOR ────────────────────────────────────────────────────
function scoreColor(score) {
  if (score >= 7) return '#2ECC71';
  if (score >= 5) return '#FFD93D';
  if (score >= 3) return '#FF6F3C';
  return '#E74C3C';
}

function scoreLabel(score) {
  if (score >= 8) return 'Excellent 🌟';
  if (score >= 6) return 'Good 👍';
  if (score >= 4) return 'Moderate ⚠️';
  if (score >= 2) return 'Poor 🔴';
  return 'Avoid ❌';
}

function upfColor(nova) {
  const map = { 1: '#2ECC71', 2: '#FFD93D', 3: '#FF6F3C', 4: '#E74C3C' };
  return map[nova] || '#8B949E';
}

// ─── SCORE RING SVG ────────────────────────────────────────────────────────
function scoreRing(score, size = 100) {
  const r = (size / 2) - 8;
  const circ = 2 * Math.PI * r;
  const fill = (score / 10) * circ;
  const color = scoreColor(score);
  const cx = size / 2, cy = size / 2;

  return `
    <div class="score-ring" style="width:${size}px;height:${size}px">
      <svg class="score-svg" width="${size}" height="${size}">
        <circle cx="${cx}" cy="${cy}" r="${r}"
          fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
        <circle cx="${cx}" cy="${cy}" r="${r}"
          fill="none" stroke="${color}" stroke-width="8"
          stroke-dasharray="${fill} ${circ}"
          stroke-linecap="round"
          style="transition: stroke-dasharray 1s cubic-bezier(.4,0,.2,1)"/>
      </svg>
      <div class="score-text">
        <span class="score-value" style="color:${color}">${score}</span>
        <span class="score-label">/ 10</span>
      </div>
    </div>`;
}

// ─── RENDER NAV ───────────────────────────────────────────────────────────
function renderNav() {
  document.getElementById('nav').innerHTML = NAV_ITEMS.map(item => `
    <button class="nav-item ${currentTab === item.id ? 'active' : ''}"
            onclick="navigate('${item.id}')">
      <span class="nav-icon">${item.icon}</span>
      ${item.label}
    </button>
  `).join('');
}

function navigate(tab) {
  currentTab = tab;
  renderNav();
  renderContent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── API STATUS NOTICE ────────────────────────────────────────────────────
function apiNotice() {
  return `<div class="api-notice">

    <code>API_BASE = 'http://localhost:8000'</code> in this file, 
    or deploy to Railway and update the URL. 
    Add <code>ANTHROPIC_API_KEY</code> to your <code>.env</code> file to enable AI.
  </div>`;
}

// ─── SCAN ──────────────────────────────────────────────────────────────────
function renderScan() {
  const result = scanResult;
  return `
    <div class="animate-in">
      <div class="section-title">Food <span>Scanner</span></div>
      ${apiNotice()}

      <div class="card">
        <div class="input-group">
          <label class="input-label">ENTER BARCODE NUMBER</label>
          <input class="input" id="barcode-input" type="text"
            placeholder="e.g. 3017620422003 (Nutella)"
            value=""
            onkeydown="if(event.key==='Enter')scanFood()" />
        </div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:16px">
          Try: <span onclick="document.getElementById('barcode-input').value='3017620422003'" style="color:var(--green);cursor:pointer">3017620422003</span> (Nutella) · 
          <span onclick="document.getElementById('barcode-input').value='5000159484763'" style="color:var(--green);cursor:pointer">5000159484763</span> (Kit Kat) · 
          <span onclick="document.getElementById('barcode-input').value='0038000138690'" style="color:var(--green);cursor:pointer">0038000138690</span> (Corn Flakes)
        </div>
        <button class="btn btn-primary" onclick="scanFood()" id="scan-btn">
          📷 Scan Food
        </button>
      </div>

      <div id="scan-result"></div>
    </div>`;
}

async function scanFood() {
  const barcode = document.getElementById('barcode-input')?.value?.trim();
  if (!barcode) return;

  const btn = document.getElementById('scan-btn');
  const resultEl = document.getElementById('scan-result');

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';
  resultEl.innerHTML = '<div class="loading-card"></div><div class="loading-card"></div>';

  try {
    const data = await apiCall('/food/scan', 'POST', { barcode });
    scanResult = data;
    displayScanResult(data);
  } catch (err) {
    resultEl.innerHTML = `
      <div class="alert alert-warn">
        ⚠️ ${err.message || 'Scan failed. Make sure the backend is running.'}
      </div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '📷 Scan Food';
  }
}

function displayScanResult(data) {
  const resultEl = document.getElementById('scan-result');
  if (!resultEl) return;

  const color = scoreColor(data.health_score);
  const upfWidth = (data.upf_level / 4) * 100;
  const upfC = upfColor(data.upf_level);
  const nutriClass = `badge-${data.nutriscore?.toUpperCase() || 'unknown'}`;

  resultEl.innerHTML = `
    <div class="card animate-in" style="border-top:3px solid ${color}">
      <div class="product-row">
        <div>
          ${data.image_url
            ? `<img src="${data.image_url}" alt="product" class="food-img" onerror="this.style.display='none'">`
            : `<div class="food-img-placeholder">🍽️</div>`}
        </div>
        <div class="product-info">
          <div class="product-name">${data.product_name}</div>
          <div class="product-brand">${data.brand}</div>
          <div style="display:flex;gap:8px;align-items:center">
            <div class="nutri-badge ${nutriClass}">${data.nutriscore || '?'}</div>
            <span style="font-size:12px;color:var(--muted)">Nutri-Score</span>
          </div>
        </div>
      </div>

      <div class="score-ring-container">
        ${scoreRing(data.health_score, 100)}
        <div>
          <div style="font-family:var(--font);font-size:18px;font-weight:700">${scoreLabel(data.health_score)}</div>
          <div style="font-size:13px;color:var(--muted);margin-top:4px">Health Score</div>
          <div style="font-size:13px;color:var(--muted);margin-top:8px">UPF Level: NOVA ${data.upf_level}/4</div>
          <div class="upf-meter" style="width:140px">
            <div class="upf-fill" style="width:${upfWidth}%;background:${upfC}"></div>
          </div>
        </div>
      </div>

      ${data.calories_100g ? `
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-num">${Math.round(data.calories_100g)}</div>
          <div class="stat-desc">Calories / 100g</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${data.protein_100g ?? '?'}g</div>
          <div class="stat-desc">Protein</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${data.sugar_100g ?? '?'}g</div>
          <div class="stat-desc">Sugar</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${data.fat_100g ?? '?'}g</div>
          <div class="stat-desc">Fat</div>
        </div>
      </div>` : ''}
    </div>

    <div class="card animate-in">
      <div style="font-weight:700;margin-bottom:12px;font-family:var(--font)">🤖 AI Analysis</div>
      <div style="font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap">${data.ai_analysis}</div>
    </div>`;
}

// ─── PLAN ──────────────────────────────────────────────────────────────────
let planGoal = 'balanced';
let planBudget = 'medium';
let planDays = 7;
let planPrefs = [];
let planAllergies = [];
let planPantry = '';

function renderPlan() {
  const goals = ['fat-loss','muscle-gain','balanced','glp1'];
  const budgets = ['low','medium','high'];

  return `
    <div class="animate-in">
      <div class="section-title">Meal <span>Planner</span></div>
      ${apiNotice()}

      <div class="card">
        <div class="input-group">
          <label class="input-label">YOUR GOAL</label>
          <div class="tags">
            ${goals.map(g => `<span class="tag ${planGoal===g?'active':''}" onclick="planGoal='${g}';renderContent()">${g.replace('-',' ').toUpperCase()}</span>`).join('')}
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">BUDGET LEVEL</label>
          <div class="tags">
            ${budgets.map(b => `<span class="tag ${planBudget===b?'active':''}" onclick="planBudget='${b}';renderContent()">${b.toUpperCase()}</span>`).join('')}
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">PLAN DURATION</label>
          <div class="tags">
            ${[3,5,7,14].map(d => `<span class="tag ${planDays===d?'active':''}" onclick="planDays=${d};renderContent()">${d} days</span>`).join('')}
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">DIETARY PREFERENCES (optional)</label>
          <input class="input" id="plan-prefs" type="text"
            placeholder="e.g. high-protein, vegetarian, Mediterranean"
            value="${planPrefs.join(', ')}" />
        </div>

        <div class="input-group">
          <label class="input-label">ALLERGIES (optional)</label>
          <input class="input" id="plan-allergies" type="text"
            placeholder="e.g. peanuts, gluten, dairy"
            value="${planAllergies.join(', ')}" />
        </div>

        <div class="input-group">
          <label class="input-label">PANTRY ITEMS (optional)</label>
          <input class="input" id="plan-pantry" type="text"
            placeholder="e.g. eggs, rice, spinach, chicken"
            value="${planPantry}" />
        </div>

        <button class="btn btn-primary" onclick="generatePlan()" id="plan-btn">
          ✨ Generate ${planDays}-Day Meal Plan
        </button>
      </div>

      <div id="plan-result">
        ${mealPlan ? `
        <div class="card animate-in">
          <div style="font-weight:700;margin-bottom:12px;font-family:var(--font)">
            📋 Your ${mealPlan.duration_days}-Day Plan
            <span style="font-size:12px;font-weight:400;color:var(--muted);margin-left:8px">
              Generated ${new Date(mealPlan.generated_at).toLocaleDateString()}
            </span>
          </div>
          <div class="plan-output">${mealPlan.plan_text}</div>
        </div>` : ''}
      </div>
    </div>`;
}

async function generatePlan() {
  const btn = document.getElementById('plan-btn');
  const resultEl = document.getElementById('plan-result');

  planPrefs    = document.getElementById('plan-prefs')?.value.split(',').map(s=>s.trim()).filter(Boolean) || [];
  planAllergies = document.getElementById('plan-allergies')?.value.split(',').map(s=>s.trim()).filter(Boolean) || [];
  planPantry   = document.getElementById('plan-pantry')?.value || '';

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Generating...';
  resultEl.innerHTML = '<div class="loading-card"></div><div class="loading-card"></div><div class="loading-card"></div>';

  try {
    const data = await apiCall('/mealplan/generate', 'POST', {
      goal:          planGoal,
      budget_level:  planBudget,
      duration_days: planDays,
      preferences:   planPrefs,
      allergies:     planAllergies,
      pantry_items:  planPantry.split(',').map(s=>s.trim()).filter(Boolean),
    });

    mealPlan = data;
    resultEl.innerHTML = `
      <div class="card animate-in">
        <div style="font-weight:700;margin-bottom:12px;font-family:var(--font)">
          📋 Your ${data.duration_days}-Day Plan
        </div>
        <div class="plan-output">${data.plan_text}</div>
      </div>`;
  } catch (err) {
    resultEl.innerHTML = `
      <div class="alert alert-warn">⚠️ ${err.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = `✨ Generate ${planDays}-Day Meal Plan`;
  }
}

// ─── SHOP ──────────────────────────────────────────────────────────────────
let shopBudget = 'medium';
let shopItems = [{ name: '', qty: '' }];

function renderShop() {
  return `
    <div class="animate-in">
      <div class="section-title">Cart <span>Optimizer</span></div>
      ${apiNotice()}

      <div class="card">
        <div class="input-group">
          <label class="input-label">BUDGET LEVEL</label>
          <div class="tags">
            ${['low','medium','high'].map(b => `<span class="tag ${shopBudget===b?'active':''}" onclick="shopBudget='${b}';renderContent()">${b.toUpperCase()}</span>`).join('')}
          </div>
        </div>

        <label class="input-label" style="margin-bottom:10px">SHOPPING LIST ITEMS</label>
        <div id="shop-items">
          ${shopItems.map((item, i) => `
            <div style="display:flex;gap:8px;margin-bottom:8px">
              <input class="input" style="flex:2" type="text"
                placeholder="Item name" value="${item.name}"
                oninput="shopItems[${i}].name=this.value" />
              <input class="input" style="flex:1" type="text"
                placeholder="Qty" value="${item.qty}"
                oninput="shopItems[${i}].qty=this.value" />
              ${i > 0 ? `<button onclick="shopItems.splice(${i},1);renderContent()" 
                style="background:rgba(255,111,60,0.15);border:none;border-radius:8px;color:#FF6F3C;width:40px;cursor:pointer;font-size:16px">✕</button>` : ''}
            </div>`).join('')}
        </div>

        <button class="btn btn-secondary" onclick="shopItems.push({name:'',qty:''});renderContent()" 
          style="margin-bottom:12px">+ Add Item</button>

        <button class="btn btn-primary" onclick="optimizeCart()" id="shop-btn">
          🛒 Optimize My Cart
        </button>
      </div>

      <div id="shop-result"></div>
    </div>`;
}

async function optimizeCart() {
  const btn = document.getElementById('shop-btn');
  const resultEl = document.getElementById('shop-result');

  const items = shopItems.filter(i => i.name.trim()).map(i => ({
    name: i.name.trim(),
    quantity: i.qty.trim() || '1',
  }));

  if (items.length === 0) {
    resultEl.innerHTML = `<div class="alert alert-warn">⚠️ Please add at least one item.</div>`;
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Optimizing...';
  resultEl.innerHTML = '<div class="loading-card"></div><div class="loading-card"></div>';

  try {
    const data = await apiCall('/shopping/optimize-cart', 'POST', {
      items,
      budget_level: shopBudget,
    });

    resultEl.innerHTML = `
      <div class="card animate-in">
        <div style="font-weight:700;margin-bottom:12px;font-family:var(--font)">🤖 AI Optimization</div>
        <div style="font-size:14px;line-height:1.8;white-space:pre-wrap;color:var(--text)">${data.tips}</div>
      </div>`;
  } catch (err) {
    resultEl.innerHTML = `<div class="alert alert-warn">⚠️ ${err.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🛒 Optimize My Cart';
  }
}

// ─── CHAT ──────────────────────────────────────────────────────────────────
const SUGGESTED_QUESTIONS = [
  'Is oat milk healthier than dairy?',
  'What can I cook with eggs and spinach?',
  'How do I eat well on $50/week?',
  'What are ultra-processed foods?',
];

function renderChat() {
  return `
    <div class="animate-in" style="display:flex;flex-direction:column;height:calc(100vh - 180px)">
      <div class="section-title">NutriGuide <span>AI Chat</span></div>

      ${chatHistory.length === 0 ? `
        <div class="empty-state" style="padding:20px 0">
          <span class="empty-state-icon">🥦</span>
          <div class="empty-state-title">Ask me anything about food!</div>
          <div class="empty-state-sub">Nutrition, recipes, budgets, health scores — I've got you covered.</div>
          <div class="tags" style="justify-content:center;margin-top:16px">
            ${SUGGESTED_QUESTIONS.map(q => `
              <span class="tag" onclick="sendQuestion('${q.replace(/'/g,"\\'")}')">
                ${q}
              </span>`).join('')}
          </div>
        </div>` : ''}

      <div class="chat-messages" id="chat-messages">
        ${chatHistory.map(m => `
          <div class="msg msg-${m.role === 'user' ? 'user' : 'ai'}">
            ${m.role === 'assistant' ? '🥦 ' : ''}${m.content}
          </div>`).join('')}
      </div>

      <div class="chat-input-row" style="margin-top:auto">
        <input class="input" id="chat-input" type="text"
          placeholder="Ask about nutrition, recipes, food safety..."
          onkeydown="if(event.key==='Enter')sendChat()" />
        <button class="send-btn" id="send-btn" onclick="sendChat()">➤</button>
      </div>
    </div>`;
}

async function sendQuestion(q) {
  document.getElementById('chat-input').value = q;
  await sendChat();
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');
  const msg = input?.value?.trim();
  if (!msg || isLoading) return;

  input.value = '';
  isLoading = true;

  chatHistory.push({ role: 'user', content: msg });
  renderContent();

  // Scroll to bottom
  setTimeout(() => {
    const msgs = document.getElementById('chat-messages');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  }, 50);

  const btn = document.getElementById('send-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '⏳'; }

  try {
    const data = await apiCall('/ai/chat', 'POST', {
      messages: chatHistory,
    });

    chatHistory.push({ role: 'assistant', content: data.reply });
  } catch (err) {
    chatHistory.push({
      role: 'assistant',
      content: `⚠️ Couldn't connect to the backend. Make sure the server is running at ${API_BASE} and your ANTHROPIC_API_KEY is set in .env`,
    });
  } finally {
    isLoading = false;
    renderContent();
    setTimeout(() => {
      const msgs = document.getElementById('chat-messages');
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
      document.getElementById('chat-input')?.focus();
    }, 100);
  }
}

// ─── MAIN RENDER ───────────────────────────────────────────────────────────
function renderContent() {
  const content = document.getElementById('content');
  switch (currentTab) {
    case 'home': content.innerHTML = renderHome(); break;
    case 'scan': content.innerHTML = renderScan(); break;
    case 'plan': content.innerHTML = renderPlan(); break;
    case 'shop': content.innerHTML = renderShop(); break;
    case 'chat': content.innerHTML = renderChat(); break;
  }
  renderNav();
}

// ─── INIT ──────────────────────────────────────────────────────────────────
renderContent();
</script>
