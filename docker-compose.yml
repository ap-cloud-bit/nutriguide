version: '3.9'

# NutriGuide — Local Development
# Usage: docker-compose up
# API will be at: http://localhost:8000
# Docs will be at: http://localhost:8000/docs

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY:-nutriguide-dev-secret}
    volumes:
      - ./backend:/app   # Live reload — code changes reflect immediately
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

